# Medoo Workflow Core Logic Update With Related Tests

## Action

Follow the core-logic-update-with-related-tests workflow:
1. Edit src/Medoo.php to implement the improvement or fix.
2. Update or add relevant test files in tests/ (e.g., DataMapTest.php, ColumnMappingTest.php) to cover the changes.
3. Commit both the implementation and test changes together.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: src/Medoo.php, tests/*.php

